services:
  nanogent:
    build: .
    container_name: nanogent
    restart: unless-stopped
    env_file: .env
    working_dir: /workspace
    volumes:
      # the project folder you want claude to work in
      - .:/workspace
      # reuse the host's claude auth (run `claude` once on the host first)
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    command: ["node", "nanogent.mjs"]

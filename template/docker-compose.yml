services:
  nanogent:
    build:
      context: .
      # Dockerfile.generated is produced by `nanogent build` from the base
      # Dockerfile plus each plugin's optional install.sh. It is gitignored
      # and regenerated on demand; edit Dockerfile (the base) to change the
      # image, and add install.sh files to plugins to layer in dependencies.
      dockerfile: Dockerfile.generated
    container_name: nanogent
    restart: unless-stopped
    env_file: .env
    working_dir: /workspace
    volumes:
      # The parent of .nanogent/ is the project root — that's what claude works in.
      - ..:/workspace
      # Reuse the host's claude auth (run `claude` once on the host first).
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    command: ["node", ".nanogent/nanogent.ts"]

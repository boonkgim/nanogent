services:
  nanogent:
    build: .
    container_name: nanogent
    restart: unless-stopped
    env_file: .env
    working_dir: /workspace
    volumes:
      # The parent of .nanogent/ is the project root — that's what claude works in.
      - ..:/workspace
      # Reuse the host's claude auth (run `claude` once on the host first).
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    command: ["node", ".nanogent/nanogent.ts"]
